{% extends "base.html" %}

{% block title %}
Edit Product
{% endblock %}

{% block css %}

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/dashboard.css') }}">

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/add_product.css') }}">

{% endblock %}

{% block content %}

<div class="dashboard-layout">

    <!-- Sidebar -->
    {% include "components/sidebar.html" %}

    <!-- Main Content -->
    <main class="main-content">

        <!-- Navbar -->
        {% include "components/navbar.html" %}

        <div class="product-card">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="fw-bold mb-0">

                    <i class="bi bi-pencil-square me-2"></i>

                    Edit Product

                </h2>

                <span class="badge bg-warning text-dark">

                    Product #{{ product[0] }}

                </span>

            </div>

            <form method="POST" autocomplete="off">

                <!-- Product Name -->
                <div class="mb-3">

                    <label for="product_name" class="form-label">

                        Product Name

                    </label>

                    <input
                        id="product_name"
                        type="text"
                        name="product_name"
                        class="form-control"
                        value="{{ product[1] or '' }}"
                        placeholder="Enter product name"
                        required>

                </div>

                <!-- Category -->
                <div class="mb-3">

                    <label for="category" class="form-label">

                        Category

                    </label>

                    <input
                        id="category"
                        type="text"
                        name="category"
                        class="form-control"
                        value="{{ product[4] or '' }}"
                        placeholder="Enter category"
                        required>

                </div>

                <!-- Price -->
                <div class="mb-3">

                    <label for="price" class="form-label">

                        Price

                    </label>

                    <input
                        id="price"
                        type="number"
                        name="price"
                        class="form-control"
                        min="0"
                        step="0.01"
                        value="{{ product[2] or 0 }}"
                        required>

                </div>

                <!-- Quantity -->
                <div class="mb-4">

                    <label for="quantity" class="form-label">

                        Quantity

                    </label>

                    <input
                        id="quantity"
                        type="number"
                        name="quantity"
                        class="form-control"
                        min="0"
                        value="{{ product[3] or 0 }}"
                        required>

                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="bi bi-check-circle me-2"></i>

                        Update Product

                    </button>

                    <a
                        href="{{ url_for('index') }}"
                        class="btn btn-outline-secondary">

                        <i class="bi bi-arrow-left me-2"></i>

                        Back to Dashboard

                    </a>

                </div>

            </form>

        </div>

    </main>

</div>

{% endblock %}
