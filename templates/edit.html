{% extends "base.html" %}

{% block title %}
Edit Product
{% endblock %}

{% block css %}

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/dashboard.css') }}">

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/add_product.css') }}">

{% endblock %}


{% block content %}

<div class="dashboard-layout">

    <!-- Sidebar -->
    {% include "components/sidebar.html" %}

    <!-- Main Content -->
    <main class="main-content">

        <!-- Navbar -->
        {% include "components/navbar.html" %}

        <!-- Edit Product Card -->
        <div class="product-card">

            <h2 class="fw-bold mb-4">
                <i class="bi bi-pencil-square me-2"></i>
                Edit Product
            </h2>

            <form method="POST">

                <!-- Product Name -->
                <div class="mb-3">

                    <label class="form-label">
                        Product Name
                    </label>

                    <input
                        type="text"
                        name="product_name"
                        class="form-control"
                        value="{{ product[1] }}"
                        required>

                </div>

                <!-- Category -->
                <div class="mb-3">

                    <label class="form-label">
                        Category
                    </label>

                    <input
                        type="text"
                        name="category"
                        class="form-control"
                        value="{{ product[4] }}"
                        required>

                </div>

                <!-- Price -->
                <div class="mb-3">

                    <label class="form-label">
                        Price
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        name="price"
                        class="form-control"
                        value="{{ product[2] }}"
                        required>

                </div>

                <!-- Quantity -->
                <div class="mb-4">

                    <label class="form-label">
                        Quantity
                    </label>

                    <input
                        type="number"
                        min="0"
                        name="quantity"
                        class="form-control"
                        value="{{ product[3] }}"
                        required>

                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="bi bi-check-circle me-2"></i>

                        Update Product

                    </button>

                    <a
                        href="{{ url_for('index') }}"
                        class="btn btn-secondary">

                        <i class="bi bi-arrow-left me-2"></i>

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </main>

</div>

{% endblock %}
