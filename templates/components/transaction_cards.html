<div class="row g-4 mb-4">

    <!-- Total Transactions -->
    <div class="col-md-4">

        <div class="card shadow-sm border-0 h-100">

            <div class="card-body text-center">

                <i class="bi bi-clock-history fs-1 text-primary"></i>

                <h6 class="mt-3 mb-1">
                    Total Transactions
                </h6>

                <h2 class="fw-bold">
                    {{ transactions|length }}
                </h2>

            </div>

        </div>

    </div>

    <!-- Stock In -->
    <div class="col-md-4">

        <div class="card shadow-sm border-0 h-100">

            <div class="card-body text-center">

                <i class="bi bi-box-arrow-in-down fs-1 text-success"></i>

                <h6 class="mt-3 mb-1">
                    Stock In
                </h6>

                <h2 class="fw-bold">
                    {{ stock_in_count }}
                </h2>

            </div>

        </div>

    </div>

    <!-- Stock Out -->
    <div class="col-md-4">

        <div class="card shadow-sm border-0 h-100">

            <div class="card-body text-center">

                <i class="bi bi-box-arrow-up fs-1 text-danger"></i>

                <h6 class="mt-3 mb-1">
                    Stock Out
                </h6>

                <h2 class="fw-bold">
                    {{ stock_out_count }}
                </h2>

            </div>

        </div>

    </div>

</div>
