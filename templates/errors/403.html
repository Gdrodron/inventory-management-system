{% extends "base.html" %}

{% block title %}
403 - Forbidden
{% endblock %}

{% block css %}

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/errors.css') }}">

{% endblock %}

{% block content %}

<div class="error-page">

    <div class="error-card">

        <i class="bi bi-shield-lock error-icon warning"></i>

        <h1 class="error-code">
            403
        </h1>

        <h2 class="error-title">
            Access Denied
        </h2>

        <p class="error-text">
            You don't have permission to access this page.
        </p>

        <div class="error-actions">

            <a href="{{ url_for('index') }}"
               class="btn btn-primary">

                <i class="bi bi-house-door me-2"></i>

                Back to Dashboard

            </a>

        </div>

        <div class="error-footer">

            Inventory Management System

        </div>

    </div>

</div>

{% endblock %}
